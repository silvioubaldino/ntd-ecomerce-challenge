services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ntd
      POSTGRES_PASSWORD: ntd
      POSTGRES_DB: ntd_ecomerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntd -d ntd_ecomerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./ntd-ecomerce-api
    environment:
      API_PORT: "8080"
      DATABASE_URL: "postgres://ntd:ntd@db:5432/ntd_ecomerce?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
