services:
  db:
    image: postgres:17-alpine
    cpus: 1.0
    mem_limit: 512m
    command: >
      postgres -c shared_buffers=64MB
               -c work_mem=4MB
               -c effective_cache_size=128MB
               -c max_connections=50
    environment:
      POSTGRES_USER: ntd
      POSTGRES_PASSWORD: ntd
      POSTGRES_DB: ntd_ecomerce
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntd -d ntd_ecomerce"]
      interval: 3s
      timeout: 3s
      retries: 10